<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CrimeDesk Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1117;
      --panel-bg: #161b25;
      --card-bg: #1c2130;
      --border: #252d3d;
      --border-light: #2a3347;
      --accent: #4a7cf7;
      --green: #00e5a0;
      --text: #d4dae8;
      --muted: #5a6580;
      --muted2: #7b8aaa;
      --error: #ff5f57;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
    }

    .logo-product {
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted2);
      margin-left: 3px;
    }

    .nav-configure {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--muted2);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .nav-configure:hover { border-color: var(--accent); color: var(--text); }
    .nav-configure svg { width: 12px; height: 12px; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1.5rem;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      width: 100%;
      max-width: 680px;
      height: fit-content;
      overflow: hidden;
    }

    .panel-body {
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    /* ── Inner cards ── */
    .inner-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.95rem 1.1rem;
    }

    .card-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.65rem;
    }

    code {
      background: rgba(255,255,255,0.05);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9em;
    }

    /* ── Select ── */
    .select-wrapper { position: relative; }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.78rem;
    }

    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 0.5rem 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    select:focus { border-color: var(--accent); }

    /* ── Action bar ── */
    .action-bar {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.85rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-run {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-run:hover:not(:disabled) { opacity: 0.83; }
    .btn-run:active:not(:disabled) { transform: scale(0.97); }
    .btn-run:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-run svg { width: 11px; height: 11px; flex-shrink: 0; }

    .action-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .spinner {
      width: 11px; height: 11px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      display: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      padding: 0.65rem 0.95rem;
      border-radius: 4px;
      line-height: 1.55;
    }

    .status.success {
      display: block;
      background: rgba(0, 229, 160, 0.07);
      border: 1px solid rgba(0, 229, 160, 0.18);
      color: var(--green);
    }

    .status.error {
      display: block;
      background: rgba(255, 95, 87, 0.07);
      border: 1px solid rgba(255, 95, 87, 0.18);
      color: var(--error);
    }

    /* ── Run status indicator ── */
    .run-status {
      display: none;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.85rem 1.1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      align-items: center;
      gap: 0.6rem;
    }

    .run-status.visible { display: flex; }

    .run-status.scanning { color: var(--accent); border-color: rgba(74,124,247,0.25); }
    .run-status.success  { color: var(--green);  border-color: rgba(0,229,160,0.2); background: rgba(0,229,160,0.06); }
    .run-status.failure  { color: var(--error);  border-color: rgba(255,95,87,0.2); background: rgba(255,95,87,0.06); }

    .scan-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .scan-spin {
      animation: spin 1.1s linear infinite;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      border-radius: 7px;
      padding: 1.6rem;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 0 80px rgba(0,0,0,0.7);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
    }

    .modal-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      line-height: 1;
      transition: color 0.15s;
    }

    .modal-close:hover { color: var(--text); }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.45rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 0.5rem 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.64rem;
      color: var(--muted);
      margin-top: 0.4rem;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      gap: 0.55rem;
      margin-top: 1.2rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.55rem;
      background: transparent;
      color: var(--muted2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-save {
      flex: 1;
      padding: 0.55rem;
      background: var(--accent);
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.85; }
  </style>
</head>

  <!-- Main -->
  <div class="main">
    <div class="panel">
      <div class="panel-body">

        <!-- Lookahead -->
        <div class="inner-card">
          <div class="card-label">Days ahead to check</div>
          <div class="select-wrapper">
            <select id="lookahead">
              <option value="0">0 — Today only</option>
              <option value="1" selected>1 — Today + next business day (default)</option>
              <option value="2">2 business days ahead</option>
              <option value="3">3 business days ahead</option>
              <option value="4">4 business days ahead</option>
              <option value="5">5 business days ahead</option>
            </select>
          </div>
        </div>

        <!-- Action bar -->
        <div class="action-bar">
          <button class="btn-run" id="runBtn" onclick="triggerWorkflow()">
            <svg viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5l8 4.5-8 4.5V1.5z"/></svg>
            Run Scanner
          </button>
          <span class="action-hint" id="actionHint">Configure token to enable</span>
        </div>

        <!-- Run status -->
        <div class="run-status" id="runStatus">
          <span class="scan-icon" id="runIcon"></span>
          <span id="runStatusText"></span>
        </div>

        <!-- Error status -->
        <div class="status" id="status"></div>

      </div>
    </div>
  </div>

  <!-- Configuration modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Configuration</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>

      <div class="field">
        <label>GitHub Personal Access Token</label>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
        <p class="hint">Requires <code>actions: write</code> scope on the <code>holygrail</code> repo. Stored locally in your browser only.</p>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveConfig()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let savedToken = '';
    let pollTimer = null;

    const REPO = 'kristiansilvaabc/holygrail';
    const WORKFLOW = 'run.yml';

    function updateUI() {
      const hint = document.getElementById('actionHint');
      const btn = document.getElementById('runBtn');
      if (savedToken) {
        hint.textContent = 'Ready to trigger workflow';
        btn.disabled = false;
      } else {
        hint.textContent = 'Configure token to enable';
        btn.disabled = true;
      }
    }

    window.addEventListener('load', () => {
      savedToken = localStorage.getItem('gh_pat') || '';
      if (savedToken) document.getElementById('tokenInput').value = savedToken;
      updateUI();
    });

    function openModal() {
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function saveConfig() {
      const val = document.getElementById('tokenInput').value.trim();
      savedToken = val;
      if (val) {
        localStorage.setItem('gh_pat', val);
      } else {
        localStorage.removeItem('gh_pat');
      }
      updateUI();
      closeModal();
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ── Status indicator helpers ──────────────────────────────────

    const SCAN_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="scan-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
    const TICK_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const FAIL_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

    function setRunStatus(state, text) {
      const el   = document.getElementById('runStatus');
      const icon = document.getElementById('runIcon');
      const txt  = document.getElementById('runStatusText');
      el.className = 'run-status visible ' + state;
      icon.innerHTML = state === 'scanning' ? SCAN_ICON : state === 'success' ? TICK_ICON : FAIL_ICON;
      txt.textContent = text;
    }

    function hideRunStatus() {
      document.getElementById('runStatus').className = 'run-status';
    }

    function hideStatus() {
      const s = document.getElementById('status');
      s.className = 'status';
      s.textContent = '';
    }

    function showError(msg) {
      const s = document.getElementById('status');
      s.className = 'status error';
      s.textContent = msg;
    }

    function ghHeaders() {
      return {
        'Authorization': `Bearer ${savedToken}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
      };
    }

    // ── Find run created just after triggerTime ───────────────────

    async function findRun(triggerTime, attempts = 0) {
      if (attempts > 30) throw new Error('Could not find workflow run after 30 attempts');

      const r = await fetch(
        `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=5`,
        { headers: ghHeaders() }
      );
      if (!r.ok) throw new Error(`Runs API ${r.status}`);
      const data = await r.json();

      const run = data.workflow_runs.find(wr =>
        new Date(wr.created_at) >= triggerTime
      );

      if (run) return run;
      await sleep(1000);
      return findRun(triggerTime, attempts + 1);
    }

    // ── Poll run until terminal state ─────────────────────────────

    async function pollRun(runId) {
      while (true) {
        const r = await fetch(
          `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
          { headers: ghHeaders() }
        );
        if (!r.ok) throw new Error(`Run API ${r.status}`);
        const run = await r.json();

        if (run.status === 'completed') {
          if (run.conclusion === 'success') {
            setRunStatus('success', 'Scan complete');
          } else {
            setRunStatus('failure', `Scan failed`);
          }
          return;
        }

        await sleep(2000);
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── Main trigger ──────────────────────────────────────────────

    async function triggerWorkflow() {
      const lookahead = document.getElementById('lookahead').value;
      const btn = document.getElementById('runBtn');

      hideStatus();
      hideRunStatus();

      if (!savedToken) {
        showError('✗ No token configured. Click Configure to add your GitHub PAT.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Triggering…';
      document.getElementById('actionHint').textContent = 'Dispatching…';

      const triggerTime = new Date();

      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          {
            method: 'POST',
            headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
            body: JSON.stringify({ ref: 'main', inputs: { lookahead } })
          }
        );

        if (res.status !== 204) {
          const body = await res.json().catch(() => ({}));
          throw new Error(`${res.status}: ${body.message || 'Unknown error'}`);
        }

        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 12 12" fill="currentColor" width="11" height="11"><path d="M2 1.5l8 4.5-8 4.5V1.5z"/></svg> Run Scanner`;
        document.getElementById('actionHint').textContent = 'Ready to trigger workflow';

        setRunStatus('scanning', 'Scanning');

        await sleep(500);
        const run = await findRun(triggerTime);
        await pollRun(run.id);

      } catch (err) {
        showError(`✗ ${err.message}`);
        hideRunStatus();
        document.getElementById('actionHint').textContent = 'Ready to trigger workflow';
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 12 12" fill="currentColor" width="11" height="11"><path d="M2 1.5l8 4.5-8 4.5V1.5z"/></svg> Run Scanner`;
      }
    }
  </script>
</body>
</html>
