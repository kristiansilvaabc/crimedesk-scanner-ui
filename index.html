<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Court Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161920;
      --border: #2a2e38;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.10);
      --text: #e8eaf0;
      --muted: #6b7280;
      --error: #ff5f57;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 460px;
      position: relative;
      box-shadow: 0 0 60px rgba(0, 229, 160, 0.04), 0 20px 60px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 2rem; right: 2rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0, 229, 160, 0.2);
      border-radius: 4px;
      padding: 3px 8px;
      margin-bottom: 1.25rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.08);
    }

    input::placeholder {
      color: var(--muted);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.85rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #0d0f12;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(13,15,18,0.3);
      border-top-color: #0d0f12;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: 'IBM Plex Mono', monospace;
      display: none;
      line-height: 1.5;
    }

    .status.success {
      background: rgba(0, 229, 160, 0.1);
      border: 1px solid rgba(0, 229, 160, 0.25);
      color: var(--accent);
      display: block;
    }

    .status.error {
      background: rgba(255, 95, 87, 0.1);
      border: 1px solid rgba(255, 95, 87, 0.25);
      color: var(--error);
      display: block;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8em;
      background: rgba(255,255,255,0.06);
      padding: 1px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="dot"></span> GitHub Actions</div>
    <h1>Court Scanner</h1>
    <p class="subtitle">Trigger the Court Watchlist Matcher on <code>kristiansilvaabc/holygrail</code></p>

    <div class="field">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
      <p class="hint">Requires <code>repo</code> or <code>actions: write</code> scope. Saved locally in your browser after first use.</p>
    </div>

    <hr class="divider"/>

    <div class="field">
      <label>Number of days ahead to check</label>
      <div class="select-wrapper">
        <select id="lookahead">
          <option value="0">0 — Today only</option>
          <option value="1" selected>1 — Today + next business day (default)</option>
          <option value="2">2 business days ahead</option>
          <option value="3">3 business days ahead</option>
          <option value="4">4 business days ahead</option>
          <option value="5">5 business days ahead</option>
        </select>
      </div>
    </div>

    <button class="btn" id="runBtn" onclick="triggerWorkflow()">Run Scanner</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    // Load saved token on page load
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('gh_pat');
      if (saved) document.getElementById('token').value = saved;
    });

    async function triggerWorkflow() {
      const token = document.getElementById('token').value.trim();
      const lookahead = document.getElementById('lookahead').value;
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('status');

      status.className = 'status';
      status.textContent = '';

      if (!token) {
        status.className = 'status error';
        status.textContent = '✗ Please enter a GitHub Personal Access Token.';
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner"></span> Triggering…';

      try {
        const res = await fetch(
          'https://api.github.com/repos/kristiansilvaabc/holygrail/actions/workflows/run.yml/dispatches',
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              ref: 'main',
              inputs: { lookahead: lookahead }
            })
          }
        );

        if (res.status === 204) {
          localStorage.setItem('gh_pat', token);
          status.className = 'status success';
          status.textContent = `✓ Workflow triggered! Lookahead: ${lookahead} day${lookahead == 1 ? '' : 's'}. Check Actions tab for progress.`;
        } else {
          const body = await res.json().catch(() => ({}));
          status.className = 'status error';
          status.textContent = `✗ Error ${res.status}: ${body.message || 'Unknown error'}`;
        }
      } catch (err) {
        status.className = 'status error';
        status.textContent = `✗ Network error: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = 'Run Scanner';
      }
    }
  </script>
</body>
</html>
